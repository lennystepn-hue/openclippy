name: Release
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - run: npm run build
      - run: npx electron-builder --publish never
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            out/*.exe
            out/*.dmg
            out/*.zip
            out/*.AppImage
            out/*.deb
          generate_release_notes: true
